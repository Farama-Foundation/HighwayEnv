name: coverage (diff)

on:
  push:
    branches:
      - main
      - 'test/**'
    paths:
      - 'highway_env/**'
  pull_request:
    branches:
      - main
      - 'test/**'
    paths:
      - 'highway_env/**'

permissions:
  contents: read

jobs:
  coverage-diff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev libportmidi-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --group test
      - name: Run tests with coverage
        run: uv run pytest --cov=highway_env --cov-report=xml
      - name: Determine compare ref
        id: compare
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi
      - name: Check diff coverage
        run: uv run diff-cover coverage.xml --compare-branch=${{ steps.compare.outputs.ref }} --fail-under=80
